name: Build CorgiCoin

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev \
            libdb++-dev \
            libminiupnpc-dev

      - name: Build daemon
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_QT_GUI=OFF -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ./test_corgicoin

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install boost openssl@3 berkeley-db miniupnpc cmake

      - name: Build daemon
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT_GUI=OFF \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBerkeleyDB_ROOT=$(brew --prefix berkeley-db)
          make -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: |
          cd build
          ./test_corgicoin
