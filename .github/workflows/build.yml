name: Build CorgiCoin

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev \
            libdb++-dev \
            libminiupnpc-dev

      - name: Build daemon
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_QT_GUI=OFF -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ./test_corgicoin

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install boost openssl@3 berkeley-db miniupnpc cmake

      - name: Build daemon
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT_GUI=OFF \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBerkeleyDB_ROOT=$(brew --prefix berkeley-db)
          make -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: |
          cd build
          ./test_corgicoin

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install vcpkg dependencies
        run: |
          vcpkg install boost-filesystem:x64-windows boost-program-options:x64-windows boost-thread:x64-windows boost-signals2:x64-windows boost-interprocess:x64-windows boost-variant:x64-windows boost-date-time:x64-windows boost-asio:x64-windows boost-algorithm:x64-windows boost-test:x64-windows openssl:x64-windows berkeleydb:x64-windows miniupnpc:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Build daemon
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_QT_GUI=OFF -DBUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          .\Release\test_corgicoin.exe
